name: Tests

# Trigger on every push to main/development AND on any pull request targeting those branches.
# This means a PR branch is tested before it can be merged.
on:
  workflow_dispatch:
  push:
    branches: [main, development]
    paths:
      - "api/**"
      - "app/**"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [main, development]
    paths:
      - "api/**"
      - "app/**"
      - ".github/workflows/tests.yml"

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: api/coverage
          retention-days: 14

