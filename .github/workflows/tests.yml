name: Tests

# Trigger on pull requests to main/development, and on all pushes.
# Merge commits from PRs are detected and skipped to avoid duplicate runs.
on:
  workflow_dispatch:
  push:
    paths:
      - "api/**"
      - "app/**"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [main, development]
    paths:
      - "api/**"
      - "app/**"
      - ".github/workflows/tests.yml"

permissions:
  contents: read # For checkout
  actions: write # For artifact upload

jobs:
  # Check if this is a duplicate run (PR merge commit on push event)
  check-skip:
    name: Check for Duplicate
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if merge commit
        id: check
        run: |
          # For push events, check if this is a merge commit (2+ parents = PR merge)
          if [ "${{ github.event_name }}" = "push" ]; then
            PARENT_COUNT=$(git cat-file -p $GITHUB_SHA | grep -c "^parent " || true)
            if [ "$PARENT_COUNT" -gt 1 ]; then
              echo "Merge commit detected - skipping to avoid duplicate with PR run"
              echo "should_skip=true" >> $GITHUB_OUTPUT
            else
              echo "Not a merge commit - running tests"
              echo "should_skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Pull request event - running tests"
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

  test-backend:
    name: Backend Tests
    needs: check-skip
    if: needs.check-skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        env:
          DB_LOG_QUERIES: false
        run: npm run test:ci

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: api/coverage
          retention-days: 14

