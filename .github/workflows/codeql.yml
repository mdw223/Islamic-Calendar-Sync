name: "CodeQL Advanced"

on:
  push:
    branches: ["main", "development"]
  pull_request:
    branches: ["main", "development"]
  schedule:
    - cron: "42 4 * * 1"

jobs:
  # Check if this is a duplicate run (PR merge commit on push event)
  check-skip:
    name: Check for Duplicate
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if merge commit
        id: check
        run: |
          # For push events, check if this is a merge commit (2+ parents = PR merge)
          if [ "${{ github.event_name }}" = "push" ]; then
            PARENT_COUNT=$(git cat-file -p $GITHUB_SHA | grep -c "^parent " || true)
            if [ "$PARENT_COUNT" -gt 1 ]; then
              echo "Merge commit detected - skipping to avoid duplicate with PR run"
              echo "should_skip=true" >> $GITHUB_OUTPUT
            else
              echo "Not a merge commit - running CodeQL"
              echo "should_skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Not a push event - running CodeQL"
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: check-skip
    if: needs.check-skip.outputs.should_skip != 'true'
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
