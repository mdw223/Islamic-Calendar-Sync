name: Deploy to VPS

on:
  workflow_dispatch: # Manual trigger (you click "Run workflow" in GitHub UI)
  push:
    branches: [main] # Runs on any push to main (includes merges)

permissions: {} # No GITHUB_TOKEN permissions needed; SSH key used for deployment

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            git pull
            docker compose -f compose.prod.yml up --build -d
            docker image prune -f
