# proxy/nginx.conf
events {
    worker_connections 1024;
}

http {
    upstream app {
        server app:5173;  # React app on port 5173
    }

    upstream api {
        server api:3000;  # API on port 3000
    }

    server {
        listen 80;
        server_name localhost;

        # Route API requests
        location /api {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route everything else to React app
        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
